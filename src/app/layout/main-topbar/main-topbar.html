<div class="topbar">
  <button class="topbar-menu-btn" type="button" aria-label="Open menu">
    <svg [size]="22" lucideMenu></svg>
  </button>

  <div class="topbar-search grow" #search>
    <p-iconfield class="w-full">
      <p-inputicon>
        <svg [size]="18" lucideSearch></svg>
      </p-inputicon>
      <input
        #searchInput
        type="text"
        pInputText
        class="w-full border-0 outline-0"
        placeholder="Search"
        (input)="onSearch($event)"
      />
    </p-iconfield>
  </div>

  <p-popover #searchPopover [dismissable]="true" styleClass="search-popover" [appendTo]="search">
    @if (isSearchLoading()) {
      <div class="search-loading">
        <p-progressSpinner strokeWidth="4" [style]="{ width: '24px', height: '24px' }" />
      </div>
    } @else {
      @for (item of results(); track item.name) {
        <button class="search-item w-full" (click)="viewOrder(item.id)">
          <img [src]="item.image" [alt]="item.name" width="32" height="32" />
          <span>{{ item.name }}</span>
        </button>
      } @empty {
        <span class="search-empty">No results found</span>
      }
    }
  </p-popover>

  <div class="topbar-actions">
    <button class="topbar-icon-btn" type="button" aria-label="Basket">
      <svg [size]="18" lucideShoppingBasket></svg>
    </button>

    <button class="topbar-icon-btn" type="button" aria-label="Notifications">
      <svg [size]="18" lucideBell fill="#aeb9be"></svg>
      <span class="topbar-notification-dot" aria-hidden="true"></span>
    </button>

    <div class="topbar-user">
      <div class="topbar-user-avatar overflow-hidden" aria-hidden="true">
        <img
          ngSrc="/images/avatar-user.png"
          alt="User Avatar"
          class="max-h-full min-h-full max-w-full object-cover"
          width="35"
          height="35"
        />
      </div>
      <span class="topbar-user-name">Johny Larsen</span>
    </div>
  </div>
</div>
