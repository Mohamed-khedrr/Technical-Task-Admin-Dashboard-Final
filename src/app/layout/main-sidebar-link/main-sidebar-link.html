<a
  [routerLink]="href()"
  class="nav-link"
  routerLinkActive="nav-link-active"
  [routerLinkActiveOptions]="{ exact: href() === '/' }"
  (click)="sideStore.closeSidebar()"
>
  <span class="nav-link-content">
    <ng-content></ng-content>
    <span>{{ label() }}</span>
  </span>
  @if (showDot()) {
    <span class="nav-link-dot" aria-hidden="true"></span>
  }
</a>
